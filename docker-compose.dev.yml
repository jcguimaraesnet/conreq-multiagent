# Docker Compose para desenvolvimento local (WSL2)
# Levanta frontend, backend e agent em containers.
# Supabase roda separado via `npx supabase start`.
# Uso: bash scripts/dev.sh (levanta Supabase + este compose)

services:
  # Servi\u00e7o de inicializa\u00e7\u00e3o \u2014 instala depend\u00eancias e termina
  init:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.python
    volumes:
      - .:/workspace:cached
      - pnpm-store:/home/vscode/.local/share/pnpm/store
      - uv-cache:/home/vscode/.cache/uv
    network_mode: host
    command: >
      bash -c "
        chown -R 1000:1000 /home/vscode/.local/share/pnpm/store /home/vscode/.cache/uv &&
        su vscode -c '
          cd /workspace &&
          pnpm config set store-dir /home/vscode/.local/share/pnpm/store &&
          pnpm install &&
          cd backend && uv sync
        '
      "

  backend:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.python
    volumes:
      - .:/workspace:cached
      - uv-cache:/home/vscode/.cache/uv
    network_mode: host
    env_file:
      - backend/.env
    user: "1000:1000"
    working_dir: /workspace
    command: pnpm dev:backend
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - conreq_service=backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "conreq_service"

  frontend:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.frontend
    volumes:
      - .:/workspace:cached
      - pnpm-store:/home/node/.local/share/pnpm/store
    network_mode: host
    env_file:
      - .env.local
    user: "1000:1000"
    working_dir: /workspace
    command: pnpm dev:frontend
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - conreq_service=frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "conreq_service"

  agent:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.python
    volumes:
      - .:/workspace:cached
      - uv-cache:/home/vscode/.cache/uv
    network_mode: host
    env_file:
      - backend/.env
    user: "1000:1000"
    working_dir: /workspace/backend
    command: >
      uv run langgraph dev --port 8123 --host 0.0.0.0
      --no-browser --n-jobs-per-worker 10
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - conreq_service=agent
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "conreq_service"

  # --- Logging infrastructure ---

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=conreq-dev
    network_mode: host
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    environment:
      - ELASTICSEARCH_HOSTS=http://localhost:9200
      - SERVER_HOST=0.0.0.0
    network_mode: host
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:3.2
    network_mode: host
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./config/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./config/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pnpm-store:
  uv-cache:
  es-data:
