[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Strict Off
    Time_Keep   On

[PARSER]
    Name        json_log
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S,%L
    Time_Strict Off
    Time_Keep   On
