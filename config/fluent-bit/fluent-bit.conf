[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  Off

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Path_Key          source
    DB                /tmp/fb-docker.db
    Read_from_Head    On
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  5

[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       json_log
    Reserve_Data On

[FILTER]
    Name         nest
    Match        docker.*
    Operation    lift
    Nested_under attrs
    Add_prefix   attrs_

[FILTER]
    Name         modify
    Match        docker.*
    Copy         attrs_conreq_service container_service

[OUTPUT]
    Name               es
    Match              docker.*
    Host               localhost
    Port               9200
    Suppress_Type_Name On
    Generate_ID        On
    Logstash_Format    On
    Logstash_Prefix    conreq-logs
    Time_Key           @timestamp
    Replace_Dots       On
