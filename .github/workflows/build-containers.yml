name: Build and Push

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: azure-container

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no ACR
        uses: azure/docker-login@v1
        with:
          login-server: acrconreq.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build e push API
        run: |
          docker build -t acrconreq.azurecr.io/api:latest -f docker/Dockerfile.api .
          docker push acrconreq.azurecr.io/api:latest

      - name: Build e push WEB
        run: |
          echo "API URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
          echo "API URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}"
          echo "API URL: ${{ vars.NEXT_PUBLIC_API_URL }}"
          echo "API URL: ${{ vars.LANGGRAPH_DEPLOYMENT_URL }}"
          docker build -t acrconreq.azurecr.io/web:latest -f docker/Dockerfile.web \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
          --build-arg LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }} \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }} \
          --build-arg NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }} \
          --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
          --build-arg LANGGRAPH_DEPLOYMENT_URL=${{ vars.LANGGRAPH_DEPLOYMENT_URL }} \
          .
          docker push acrconreq.azurecr.io/web:latest

      - name: Build e push AGENT
        run: |
          docker build -t acrconreq.azurecr.io/agent:latest -f docker/Dockerfile.agent .
          docker push acrconreq.azurecr.io/agent:latest

      # =========================
      # 🔍 DEBUG DA SECRET
      # =========================
      - name: Validar JSON da AZURE_CREDENTIALS
        env:
          AZURE_CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          echo "Lendo as chaves presentes na secret..."
          # Isso vai listar apenas os nomes das propriedades (ex: ["clientId", "clientSecret"...])
          echo "$AZURE_CREDS" | jq 'keys'

          echo "Validando se as 4 chaves exatas existem (case sensitive)..."
          # O parâmetro -e faz o comando falhar se retornar falso
          echo "$AZURE_CREDS" | jq -e 'has("clientId") and has("clientSecret") and has("subscriptionId") and has("tenantId")' > /dev/null

          echo "Sucesso! O JSON é perfeitamente válido e contém as chaves corretas."

  # =========================
  # 🚀 DEPLOY
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: azure-container
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Debug das Variáveis OIDC
        run: |
          echo "Client ID (Secrets): ${#CLIENT_ID}"
          echo "Client Secret (Secrets): ${#CLIENT_SEC}"
          echo "Tenant ID (Secrets): ${#TENANT_ID}"
          echo "Sub ID (Secrets): ${#SUB_ID}"

        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_CONTAINER }}
          CLIENT_SEC: ${{ secrets.AZURE_CLIENT_SECRET_CONTAINER }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID_CONTAINER }}
          SUB_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_CONTAINER }}

      # =========================
      # 🔑 LOGIN AZURE (MANUAL CLI)
      # =========================
      - name: Login Azure via CLI
        run: |
          echo "Realizando login no Azure via Service Principal..."
          az login --service-principal --username ${{ secrets.AZURE_CLIENT_ID_CONTAINER }} --password=${{ secrets.AZURE_CLIENT_SECRET_CONTAINER }} --tenant ${{ secrets.AZURE_TENANT_ID_CONTAINER }}

          echo "Definindo a assinatura padrão..."
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID_CONTAINER }}

      # =========================
      # 🟦 DEPLOY WEB
      # =========================
      - name: Deploy WEB
        run: |
          az containerapp up \
            --name app-conreq \
            --resource-group rg-masters-research \
            --environment env-conreq \
            --image acrconreq.azurecr.io/web:latest \
            --target-port 3000 \
            --ingress external \
            --registry-server acrconreq.azurecr.io \
            --env-vars \
              NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }} \
              NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }} \
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
              LANGGRAPH_DEPLOYMENT_URL=${{ vars.LANGGRAPH_DEPLOYMENT_URL }} \
              LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}

      # =========================
      # 🟩 DEPLOY API
      # =========================
      - name: Deploy API
        run: |
          az containerapp up \
            --name api-conreq \
            --resource-group rg-masters-research \
            --environment env-conreq \
            --image acrconreq.azurecr.io/api:latest \
            --target-port 8000 \
            --ingress external \
            --registry-server acrconreq.azurecr.io \
            --env-vars \
              NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }} \
              NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
              GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }} \
              AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }} \
              AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} \
              AZURE_OPENAI_DEPLOYMENT_NAME=${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }} \
              AZURE_AI_ENDPOINT=${{ secrets.AZURE_AI_ENDPOINT }} \
              AZURE_AI_API_KEY=${{ secrets.AZURE_AI_API_KEY }}

      # =========================
      # 🟪 DEPLOY AGENT
      # =========================
      - name: Deploy AGENT
        run: |
          az containerapp up \
            --name agent-conreq \
            --resource-group rg-masters-research \
            --environment env-conreq \
            --image acrconreq.azurecr.io/agent:latest \
            --target-port 8123 \
            --ingress external \
            --registry-server acrconreq.azurecr.io \
            --env-vars \
              NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }} \
              NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
              GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }} \
              AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }} \
              AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} \
              AZURE_OPENAI_DEPLOYMENT_NAME=${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }} \
              AZURE_AI_ENDPOINT=${{ secrets.AZURE_AI_ENDPOINT }} \
              AZURE_AI_API_KEY=${{ secrets.AZURE_AI_API_KEY }}
